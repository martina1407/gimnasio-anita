<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gimnasio Anita</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e8e8f0; font-family: 'Segoe UI', sans-serif; }
    input, select, button { font-family: inherit; }
    .tap { cursor: pointer; transition: opacity 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .tap:active { opacity: 0.7; transform: scale(0.97); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseGreen { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 0 12px rgba(34,197,94,0); } }
    @keyframes pulseRed { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }
    .slide-up { animation: slideUp 0.3s ease; }
    .fade-in { animation: fadeIn 0.2s ease; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = "https://ketporikmpgesmxllhhe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtldHBvcmlrbXBnZXNteGxsaGhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTk4NjUsImV4cCI6MjA5NTQ5NTg2NX0.64yI4Vupv5eKJVS83gReWGb1hWMWJJCIy9lYnyQErW4";
    const supabase = supabase_js.createClient(SUPABASE_URL, SUPABASE_KEY);

    const DIAS_GRACIA = 10;

    function calcularEstado(alumna, hoy) {
      if (!alumna.pagos || alumna.pagos.length === 0) return "deuda";
      const ultimo = alumna.pagos.slice().sort((a, b) => new Date(b.fecha) - new Date(a.fecha))[0];
      const fechaPago = new Date(ultimo.fecha);
      const mesHoy = hoy.getMonth();
      const anioHoy = hoy.getFullYear();
      if (fechaPago.getMonth() === mesHoy && fechaPago.getFullYear() === anioHoy) return "pagado";
      const mesAnterior = new Date(anioHoy, mesHoy - 1, 1);
      if (fechaPago.getMonth() === mesAnterior.getMonth() && fechaPago.getFullYear() === mesAnterior.getFullYear()) {
        const diasTranscurridos = Math.floor((hoy - new Date(anioHoy, mesHoy, 1)) / 86400000);
        if (diasTranscurridos <= DIAS_GRACIA) return "gracia";
        return "deuda";
      }
      return "deuda";
    }

    const ESTADO_CONFIG = {
      pagado: { label: "Al día", color: "#22c55e", bg: "#052e16", icon: "✓" },
      gracia: { label: "Período de gracia", color: "#f59e0b", bg: "#1c1003", icon: "⏳" },
      deuda: { label: "Adeuda", color: "#ef4444", bg: "#2d0808", icon: "✗" },
    };

    function App() {
      const [alumnas, setAlumnas] = useState([]);
      const [cargando, setCargando] = useState(true);
      const [vista, setVista] = useState("inicio");
      const [busqueda, setBusqueda] = useState("");
      const [alumnaSeleccionada, setAlumnaSeleccionada] = useState(null);
      const [modalPago, setModalPago] = useState(false);
      const [modalNueva, setModalNueva] = useState(false);
      const [accesoBusqueda, setAccesoBusqueda] = useState("");
      const [accesoResultado, setAccesoResultado] = useState(null);
      const [formPago, setFormPago] = useState({ monto: "", tipo: "transferencia", fecha: new Date().toISOString().split("T")[0] });
      const [formNueva, setFormNueva] = useState({ nombre: "", dni: "", horario: "" });
      const [toast, setToast] = useState(null);

      const hoy = new Date();

      useEffect(() => { cargarAlumnas(); }, []);

      async function cargarAlumnas() {
        setCargando(true);
        const { data, error } = await supabase.from("alumnas").select("*").order("nombre");
        if (!error) setAlumnas(data || []);
        setCargando(false);
      }

      const alumnasFiltradas = useMemo(() => {
        const q = busqueda.toLowerCase().trim();
        if (!q) return alumnas;
        return alumnas.filter(a => a.nombre.toLowerCase().includes(q) || a.dni.includes(q));
      }, [alumnas, busqueda]);

      const estadisticas = useMemo(() => {
        const total = alumnas.length;
        const pagadas = alumnas.filter(a => calcularEstado(a, hoy) === "pagado").length;
        const gracia = alumnas.filter(a => calcularEstado(a, hoy) === "gracia").length;
        const deben = alumnas.filter(a => calcularEstado(a, hoy) === "deuda").length;
        return { total, pagadas, gracia, deben };
      }, [alumnas]);

      function mostrarToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      }

      async function registrarPago(alumnaId) {
        const dia = parseInt(formPago.fecha.split("-")[2]);
        const conRecargo = dia > DIAS_GRACIA;
        const alumna = alumnas.find(a => a.id === alumnaId);
        const pagosActuales = alumna.pagos || [];
        const nuevosPagos = [...pagosActuales, {
          fecha: formPago.fecha,
          monto: parseFloat(formPago.monto) || 0,
          tipo: formPago.tipo,
          recargo: conRecargo
        }];
        const { error } = await supabase.from("alumnas").update({ pagos: nuevosPagos }).eq("id", alumnaId);
        if (!error) {
          await cargarAlumnas();
          setModalPago(false);
          setFormPago({ monto: "", tipo: "transferencia", fecha: new Date().toISOString().split("T")[0] });
          mostrarToast("Pago registrado correctamente ✓");
        }
      }

      async function agregarAlumna() {
        if (!formNueva.nombre.trim() || !formNueva.dni.trim()) return;
        const { error } = await supabase.from("alumnas").insert({
          nombre: formNueva.nombre.trim(),
          dni: formNueva.dni.trim(),
          horario: formNueva.horario.trim(),
          pagos: []
        });
        if (!error) {
          await cargarAlumnas();
          setModalNueva(false);
          setFormNueva({ nombre: "", dni: "", horario: "" });
          mostrarToast("Alumna agregada ✓");
        }
      }

      function buscarAcceso() {
        const q = accesoBusqueda.trim().toLowerCase();
        if (!q) return;
        const encontrada = alumnas.find(a => a.dni === q || a.nombre.toLowerCase().includes(q));
        setAccesoResultado(encontrada ? { alumna: encontrada, estado: calcularEstado(encontrada, hoy) } : { alumna: null });
      }

      function resetAcceso() { setAccesoBusqueda(""); setAccesoResultado(null); }

      const mesNombre = hoy.toLocaleDateString("es-AR", { month: "long", year: "numeric" });
      const inputStyle = { width: "100%", background: "#1e1e2a", border: "1px solid #2a2a3a", borderRadius: 10, padding: "12px 14px", color: "#fff", fontSize: 15, outline: "none" };
      const btnPrimary = { width: "100%", padding: "14px", borderRadius: 12, border: "none", background: "#4f46e5", color: "#fff", fontSize: 16, fontWeight: 600, cursor: "pointer" };

      if (cargando) return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
          <div style={{ fontSize: 40 }}>🏋️</div>
          <div style={{ color: "#888", fontSize: 15 }}>Cargando...</div>
        </div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", maxWidth: 480, margin: "0 auto", paddingBottom: 80 }}>

          {toast && <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: "#14532d", color: "#fff", padding: "10px 20px", borderRadius: 12, fontSize: 14, zIndex: 1000, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.5)" }}>{toast}</div>}

          {/* MODAL PAGO */}
          {modalPago && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "flex-end", zIndex: 900 }} onClick={() => setModalPago(false)}>
              <div style={{ background: "#16161f", width: "100%", maxWidth: 480, margin: "0 auto", borderRadius: "20px 20px 0 0", padding: "28px 24px 40px", animation: "slideUp 0.3s ease" }} onClick={e => e.stopPropagation()}>
                <div style={{ width: 36, height: 4, background: "#333", borderRadius: 2, margin: "0 auto 24px" }} />
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>Registrar pago</div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Monto ($)</div>
                  <input type="number" placeholder="18000" value={formPago.monto} onChange={e => setFormPago(p => ({ ...p, monto: e.target.value }))} style={inputStyle} />
                </div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Fecha</div>
                  <input type="date" value={formPago.fecha} onChange={e => setFormPago(p => ({ ...p, fecha: e.target.value }))} style={inputStyle} />
                  {parseInt(formPago.fecha.split("-")[2]) > DIAS_GRACIA && <div style={{ marginTop: 6, fontSize: 12, color: "#f59e0b" }}>⚠️ Después del día 10 — se aplica recargo</div>}
                </div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Forma de pago</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {["transferencia", "efectivo"].map(t => (
                      <button key={t} onClick={() => setFormPago(p => ({ ...p, tipo: t }))} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1px solid", borderColor: formPago.tipo === t ? "#818cf8" : "#2a2a3a", background: formPago.tipo === t ? "#1e1b4b" : "#1e1e2a", color: formPago.tipo === t ? "#818cf8" : "#888", fontSize: 14, fontWeight: 500, cursor: "pointer" }}>
                        {t === "transferencia" ? "💳 Transferencia" : "💵 Efectivo"}
                      </button>
                    ))}
                  </div>
                </div>
                <button onClick={() => alumnaSeleccionada && registrarPago(alumnaSeleccionada.id)} style={{ ...btnPrimary, background: formPago.monto ? "#4f46e5" : "#2a2a3a", color: formPago.monto ? "#fff" : "#555" }}>Confirmar pago</button>
              </div>
            </div>
          )}

          {/* MODAL NUEVA */}
          {modalNueva && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "flex-end", zIndex: 900 }} onClick={() => setModalNueva(false)}>
              <div style={{ background: "#16161f", width: "100%", maxWidth: 480, margin: "0 auto", borderRadius: "20px 20px 0 0", padding: "28px 24px 40px", animation: "slideUp 0.3s ease" }} onClick={e => e.stopPropagation()}>
                <div style={{ width: 36, height: 4, background: "#333", borderRadius: 2, margin: "0 auto 24px" }} />
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>Nueva alumna</div>
                {[{ label: "Nombre completo", key: "nombre", placeholder: "Ej: Valentina Romero", type: "text" }, { label: "DNI", key: "dni", placeholder: "Ej: 38201456", type: "number" }, { label: "Horario asignado", key: "horario", placeholder: "Ej: Lun/Mié/Vie 8:00", type: "text" }].map(f => (
                  <div key={f.key} style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>{f.label}</div>
                    <input type={f.type} placeholder={f.placeholder} value={formNueva[f.key]} onChange={e => setFormNueva(p => ({ ...p, [f.key]: e.target.value }))} style={inputStyle} />
                  </div>
                ))}
                <button onClick={agregarAlumna} style={{ ...btnPrimary, marginTop: 8, background: formNueva.nombre && formNueva.dni ? "#4f46e5" : "#2a2a3a", color: formNueva.nombre && formNueva.dni ? "#fff" : "#555" }}>Agregar alumna</button>
              </div>
            </div>
          )}

          {/* INICIO */}
          {vista === "inicio" && (
            <div className="slide-up" style={{ padding: "24px 20px" }}>
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 12, color: "#666", textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>{mesNombre}</div>
                <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.2 }}>Hola, Anita 👋</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
                <div style={{ background: "#14532d22", border: "1px solid #14532d", borderRadius: 14, padding: "16px 14px" }}>
                  <div style={{ fontSize: 32, fontWeight: 700, color: "#22c55e" }}>{estadisticas.pagadas}</div>
                  <div style={{ fontSize: 13, color: "#4ade80", marginTop: 2 }}>Al día</div>
                </div>
                <div style={{ background: "#7f1d1d22", border: "1px solid #7f1d1d", borderRadius: 14, padding: "16px 14px" }}>
                  <div style={{ fontSize: 32, fontWeight: 700, color: "#ef4444" }}>{estadisticas.deben}</div>
                  <div style={{ fontSize: 13, color: "#f87171", marginTop: 2 }}>Adeudan</div>
                </div>
                <div style={{ background: "#78350f22", border: "1px solid #78350f", borderRadius: 14, padding: "16px 14px" }}>
                  <div style={{ fontSize: 32, fontWeight: 700, color: "#f59e0b" }}>{estadisticas.gracia}</div>
                  <div style={{ fontSize: 13, color: "#fbbf24", marginTop: 2 }}>En gracia</div>
                </div>
                <div style={{ background: "#1e1e2a", border: "1px solid #2a2a3a", borderRadius: 14, padding: "16px 14px" }}>
                  <div style={{ fontSize: 32, fontWeight: 700 }}>{estadisticas.total}</div>
                  <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>Total alumnas</div>
                </div>
              </div>
              <div style={{ fontSize: 12, color: "#555", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Acciones</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <button className="tap" onClick={() => setVista("acceso")} style={{ background: "linear-gradient(135deg,#1e1b4b,#2e1b5b)", border: "1px solid #4f46e5", borderRadius: 14, padding: "18px 20px", color: "#fff", textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ fontSize: 28 }}>🚪</div>
                  <div><div style={{ fontWeight: 700, fontSize: 16 }}>Control de acceso</div><div style={{ fontSize: 13, color: "#818cf8", marginTop: 2 }}>Buscá una alumna al entrar al gimnasio</div></div>
                </button>
                <button className="tap" onClick={() => setVista("lista")} style={{ background: "#16161f", border: "1px solid #2a2a3a", borderRadius: 14, padding: "18px 20px", color: "#fff", textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ fontSize: 28 }}>📋</div>
                  <div><div style={{ fontWeight: 700, fontSize: 16 }}>Lista completa</div><div style={{ fontSize: 13, color: "#666", marginTop: 2 }}>Ver y gestionar todas las alumnas</div></div>
                </button>
              </div>
              {estadisticas.deben > 0 && (
                <div style={{ marginTop: 24 }}>
                  <div style={{ fontSize: 12, color: "#555", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Adeudando este mes</div>
                  {alumnas.filter(a => calcularEstado(a, hoy) === "deuda").map(a => (
                    <div key={a.id} className="tap" onClick={() => { setAlumnaSeleccionada(a); setVista("detalle"); }} style={{ background: "#2d080822", border: "1px solid #7f1d1d55", borderRadius: 12, padding: "12px 14px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
                      <div><div style={{ fontWeight: 600, fontSize: 15 }}>{a.nombre}</div><div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{a.horario}</div></div>
                      <div style={{ color: "#ef4444", fontSize: 13, fontWeight: 600 }}>Ver →</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ACCESO */}
          {vista === "acceso" && (
            <div className="slide-up" style={{ padding: "24px 20px" }}>
              <button className="tap" onClick={() => { setVista("inicio"); resetAcceso(); }} style={{ background: "none", border: "none", color: "#818cf8", fontSize: 15, cursor: "pointer", marginBottom: 20, padding: 0 }}>← Volver</button>
              <div style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Control de acceso 🚪</div>
              <div style={{ fontSize: 14, color: "#666", marginBottom: 24 }}>Ingresá el DNI o nombre de la alumna</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
                <input type="text" placeholder="DNI o nombre..." value={accesoBusqueda} onChange={e => setAccesoBusqueda(e.target.value)} onKeyDown={e => e.key === "Enter" && buscarAcceso()} autoFocus style={{ ...inputStyle, flex: 1 }} />
                <button className="tap" onClick={buscarAcceso} style={{ background: "#4f46e5", border: "none", borderRadius: 12, padding: "14px 20px", color: "#fff", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>Buscar</button>
              </div>
              {accesoResultado && (
                <div className="fade-in">
                  {!accesoResultado.alumna ? (
                    <div style={{ background: "#1e1e2a", border: "1px solid #2a2a3a", borderRadius: 16, padding: "24px", textAlign: "center" }}>
                      <div style={{ fontSize: 40, marginBottom: 12 }}>🤷</div>
                      <div style={{ fontWeight: 600, fontSize: 16 }}>Alumna no encontrada</div>
                      <div style={{ fontSize: 13, color: "#666", marginTop: 6 }}>Verificá el DNI o nombre ingresado</div>
                    </div>
                  ) : (() => {
                    const cfg = ESTADO_CONFIG[accesoResultado.estado];
                    return (
                      <div style={{ background: cfg.bg, border: `2px solid ${cfg.color}`, borderRadius: 20, padding: "28px 24px", textAlign: "center", animation: accesoResultado.estado === "pagado" ? "pulseGreen 2s ease infinite" : accesoResultado.estado === "deuda" ? "pulseRed 2s ease infinite" : "none" }}>
                        <div style={{ fontSize: 56, marginBottom: 8 }}>{accesoResultado.estado === "pagado" ? "✅" : accesoResultado.estado === "gracia" ? "⏳" : "🚫"}</div>
                        <div style={{ fontSize: 22, fontWeight: 700, color: cfg.color, marginBottom: 6 }}>{cfg.label.toUpperCase()}</div>
                        <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 4 }}>{accesoResultado.alumna.nombre}</div>
                        <div style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>DNI {accesoResultado.alumna.dni} · {accesoResultado.alumna.horario}</div>
                        {accesoResultado.estado === "deuda" && (
                          <button className="tap" onClick={() => { setAlumnaSeleccionada(accesoResultado.alumna); setModalPago(true); }} style={{ ...btnPrimary, marginBottom: 10 }}>💳 Registrar pago ahora</button>
                        )}
                        <button className="tap" onClick={resetAcceso} style={{ width: "100%", background: "transparent", border: "1px solid #2a2a3a", borderRadius: 12, padding: "10px 24px", color: "#888", fontSize: 14, cursor: "pointer" }}>Buscar otra alumna</button>
                      </div>
                    );
                  })()}
                </div>
              )}
            </div>
          )}

          {/* LISTA */}
          {vista === "lista" && (
            <div className="slide-up" style={{ padding: "24px 20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <button className="tap" onClick={() => setVista("inicio")} style={{ background: "none", border: "none", color: "#818cf8", fontSize: 15, cursor: "pointer", padding: 0, marginBottom: 8, display: "block" }}>← Volver</button>
                  <div style={{ fontSize: 22, fontWeight: 700 }}>Alumnas</div>
                </div>
                <button className="tap" onClick={() => setModalNueva(true)} style={{ background: "#4f46e5", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>+ Nueva</button>
              </div>
              <input type="text" placeholder="Buscar por nombre o DNI..." value={busqueda} onChange={e => setBusqueda(e.target.value)} style={{ ...inputStyle, marginBottom: 16 }} />
              {alumnasFiltradas.map(a => {
                const estado = calcularEstado(a, hoy);
                const cfg = ESTADO_CONFIG[estado];
                return (
                  <div key={a.id} className="tap" onClick={() => { setAlumnaSeleccionada(a); setVista("detalle"); }} style={{ background: "#16161f", border: "1px solid #1e1e2a", borderLeft: `3px solid ${cfg.color}`, borderRadius: 12, padding: "14px 16px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 15 }}>{a.nombre}</div>
                      <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>DNI {a.dni} · {a.horario}</div>
                    </div>
                    <div style={{ background: cfg.bg, color: cfg.color, border: `1px solid ${cfg.color}44`, borderRadius: 8, padding: "4px 10px", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", marginLeft: 10 }}>{cfg.label}</div>
                  </div>
                );
              })}
            </div>
          )}

          {/* DETALLE */}
          {vista === "detalle" && alumnaSeleccionada && (() => {
            const a = alumnas.find(x => x.id === alumnaSeleccionada.id) || alumnaSeleccionada;
            const estado = calcularEstado(a, hoy);
            const cfg = ESTADO_CONFIG[estado];
            return (
              <div className="slide-up" style={{ padding: "24px 20px" }}>
                <button className="tap" onClick={() => setVista("lista")} style={{ background: "none", border: "none", color: "#818cf8", fontSize: 15, cursor: "pointer", marginBottom: 20, padding: 0 }}>← Volver</button>
                <div style={{ background: cfg.bg, border: `1px solid ${cfg.color}55`, borderRadius: 16, padding: "20px", marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: 20, fontWeight: 700 }}>{a.nombre}</div>
                      <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>DNI {a.dni}</div>
                      <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>🕐 {a.horario}</div>
                    </div>
                    <div style={{ background: cfg.color + "22", color: cfg.color, border: `1px solid ${cfg.color}55`, borderRadius: 10, padding: "6px 12px", fontSize: 13, fontWeight: 700 }}>{cfg.icon} {cfg.label}</div>
                  </div>
                </div>
                <button className="tap" onClick={() => { setAlumnaSeleccionada(a); setModalPago(true); }} style={{ ...btnPrimary, marginBottom: 20 }}>💳 Registrar nuevo pago</button>
                <div style={{ fontSize: 12, color: "#555", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Historial de pagos</div>
                {(!a.pagos || a.pagos.length === 0) ? (
                  <div style={{ background: "#16161f", border: "1px solid #2a2a3a", borderRadius: 12, padding: "20px", textAlign: "center", color: "#555", fontSize: 14 }}>Sin pagos registrados</div>
                ) : (
                  [...a.pagos].reverse().map((p, i) => (
                    <div key={i} style={{ background: "#16161f", border: "1px solid #1e1e2a", borderRadius: 12, padding: "14px 16px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 15 }}>${p.monto?.toLocaleString("es-AR")}</div>
                        <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>
                          {new Date(p.fecha + "T12:00:00").toLocaleDateString("es-AR", { day: "numeric", month: "long", year: "numeric" })} · {p.tipo === "transferencia" ? "💳" : "💵"} {p.tipo}
                        </div>
                      </div>
                      {p.recargo && <div style={{ background: "#78350f22", color: "#f59e0b", border: "1px solid #78350f55", borderRadius: 8, padding: "4px 8px", fontSize: 11, fontWeight: 600 }}>+ recargo</div>}
                    </div>
                  ))
                )}
              </div>
            );
          })()}

          {/* NAV */}
          <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#16161f", borderTop: "1px solid #1e1e2a", display: "flex", padding: "8px 0 16px" }}>
            {[{ icon: "🏠", label: "Inicio", id: "inicio" }, { icon: "🚪", label: "Acceso", id: "acceso" }, { icon: "📋", label: "Alumnas", id: "lista" }].map(tab => (
              <button key={tab.id} className="tap" onClick={() => setVista(tab.id)} style={{ flex: 1, background: "none", border: "none", color: vista === tab.id ? "#818cf8" : "#555", cursor: "pointer", padding: "6px 0" }}>
                <div style={{ fontSize: 22 }}>{tab.icon}</div>
                <div style={{ fontSize: 11, marginTop: 2, fontWeight: vista === tab.id ? 600 : 400 }}>{tab.label}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
